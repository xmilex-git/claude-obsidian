name: Deploy CUBRID Wiki (Quartz) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'website/**'
      - '.github/workflows/deploy-quartz.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Quartz uses git log for modified dates

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify wiki/ is present
        run: |
          echo "--- pwd ---"
          pwd
          echo "--- repo root contents ---"
          ls -la
          echo "--- wiki count ---"
          count=$(find wiki -name '*.md' 2>/dev/null | wc -l)
          echo "wiki md files: $count"
          [ "$count" -gt 100 ] || { echo "FAIL: wiki has fewer than 100 md files"; exit 1; }

      - name: Wire wiki/ into Quartz content
        working-directory: website
        run: |
          rm -rf content
          mkdir -p content
          cp -R ../wiki/. content/
          echo "--- content/ contents ---"
          ls -la content/ | head
          count=$(find content -name '*.md' | wc -l)
          echo "content md files: $count"
          [ "$count" -gt 100 ] || { echo "FAIL: copy produced empty content/"; exit 1; }

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Build Quartz
        working-directory: website
        run: |
          npx quartz build 2>&1 | tee build.log
          echo "--- public dir ---"
          ls public | head -15
          htmlcount=$(find public -name '*.html' | wc -l)
          echo "html files: $htmlcount"
          [ "$htmlcount" -gt 100 ] || { echo "FAIL: Quartz emitted fewer than 100 HTML files"; cat build.log; exit 1; }

      - uses: actions/configure-pages@v5
        with:
          enablement: true  # auto-enable Pages on first run (needs pages:write)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

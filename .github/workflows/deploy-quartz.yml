name: Deploy CUBRID Wiki (Quartz) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'website/**'
      - '.github/workflows/deploy-quartz.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Quartz uses git log for modified dates

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify wiki/ is present
        run: |
          count=$(find wiki -name '*.md' 2>/dev/null | wc -l)
          echo "wiki md files: $count"
          [ "$count" -gt 100 ] || { echo "FAIL: wiki has fewer than 100 md files"; exit 1; }

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Cache Quartz font downloads (Google Fonts)
        uses: actions/cache@v4
        with:
          path: website/quartz/.quartz-cache/fonts
          key: quartz-fonts-${{ runner.os }}-${{ hashFiles('website/quartz.config.ts') }}
          restore-keys: |
            quartz-fonts-${{ runner.os }}-

      - name: Build Quartz (source = ../wiki)
        working-directory: website
        run: |
          npx quartz build -d ../wiki
          htmlcount=$(find public -name '*.html' | wc -l)
          echo "html files emitted: $htmlcount"
          [ "$htmlcount" -gt 100 ] || { echo "FAIL: Quartz emitted fewer than 100 HTML files"; exit 1; }

      - uses: actions/configure-pages@v5
        with:
          enablement: true  # auto-enable Pages on first run (needs pages:write)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

name: Deploy CUBRID Wiki (Quartz) to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'website/**'
      - '.github/workflows/deploy-quartz.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Quartz uses git log for modified dates

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Wire wiki/ into Quartz content
        working-directory: website
        run: |
          rm -rf content
          ln -s ../wiki content

      - name: Install deps
        working-directory: website
        run: npm ci

      - name: Build Quartz
        working-directory: website
        run: npx quartz build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
